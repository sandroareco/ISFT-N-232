<main class="px-6 lg:px-32 my-10">

  <section>
    @for(items of nosotros ; track items){
    <div class="grid max-w-screen-xl py-8 mx-auto lg:gap-8 lg:grid-cols-12">
        <div class="mr-auto place-self-center lg:col-span-7">
            <h1 class="font-semibold text-lg mb-2">
              {{ items.title }}
            </h1>
            <p class="max-w-2xl mb-3 text-stone-800 lg:mb-8 md:text-lg lg:text-base">
              {{ items.description }}
            </p>
        </div>
        <div class="hidden lg:mt-0 lg:col-span-5 lg:flex">
            <img [src]="items.url" [alt]="items.title">
        </div>                
    </div>
  }
</section>

  <h2 class="my-5 text-2xl text-stone-800">Noticias</h2>
  <div class="grid lg:grid-cols-4 lg:gap-2 gap-6 justify-center">
    @for(item of notice ; track item){
    <div class="relative overflow-hidden group w-[230px]">
      <a [routerLink]="['/noticia', item.route]">
        <div class="relative">
          <img [src]="item.url" [alt]="item.title" class="w-full h-[150px] object-cover transition-transform duration-300 ease-in-out transform group-hover:scale-105">
          <div class="absolute inset-0 bg-white/20 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>
        </div>
        <div class="mt-2 w-full">
            <h5 class="font-semibold hover:underline">{{ item.title }}</h5>
            <p class="text-sm text-[#747474] line-clamp-2">{{ item.description }}</p>
        </div>
    </a>
    </div>
    }
  </div>
</main>
